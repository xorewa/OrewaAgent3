model:
  default: mimo-v2.5-pro
  provider: xiaomi
  base_url: https://token-plan-sgp.xiaomimimo.com/v1
agent:
  max_turns: 150
  reasoning_effort: medium
  api_max_retries: 1
providers:
  xiaomi:
    request_timeout_seconds: 300
    stale_timeout_seconds: 120
streaming:
  enabled: false
terminal:
  timeout: 600
code_execution:
  timeout: 600
  max_tool_calls: 200
delegation:
  max_iterations: 200
